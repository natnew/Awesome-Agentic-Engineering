name: Suggestion / section proposal
description: Suggest a new section, structural change, or general improvement
title: "[Suggestion]: "
labels: ["suggestion", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for ideas you don't want to author yourself, new sections, structural proposals, or feedback on the repository's direction.
  - type: textarea
    id: problem
    attributes:
      label: What problem or gap does this address?
      description: Reference the mission in `specs/mission.md` where useful.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the suggestion. If it's a new section, outline the scope and entry criteria.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways this could be addressed, or related resources that already exist.
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Supporting evidence or references
      description: Links, papers, or examples that support the suggestion.
    validations:
      required: false
