name: Link Check (Scheduled)

on:
  schedule:
    # Mondays 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    name: markdown-link-check (full repo)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdown-link-check over all markdown
        id: link_check
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.markdown-link-check.json'
        continue-on-error: true

      - name: Open/update tracking issue on failure
        if: steps.link_check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Weekly link check — broken links detected';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The scheduled link checker reported broken links in the repository.',
              '',
              `- Workflow run: ${runUrl}`,
              `- Triggered: ${new Date().toISOString()}`,
              '',
              'Open the run log above for the per-file list of failing URLs.',
              '',
              '_This issue is maintained automatically by `.github/workflows/link-check-scheduled.yml`._',
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automation,link-check',
              per_page: 100,
            });
            const match = existing.find(i => i.title === title);

            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
              core.info(`Updated existing issue #${match.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['automation', 'link-check'],
              });
              core.info(`Opened issue #${created.number}`);
            }
