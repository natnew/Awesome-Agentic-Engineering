name: Markdown Lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.jsonc'
      - '.github/workflows/markdown-lint.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2 (advisory)
        # Advisory rollout: surface violations but do not fail the check.
        # Flip this to `false` once existing content is cleaned up.
        continue-on-error: true
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            #node_modules
