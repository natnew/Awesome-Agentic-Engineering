name: Stale Entry Detector

on:
  schedule:
    # 1st of every month, 09:00 UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      freshness_months:
        description: 'Stale threshold in months'
        required: false
        default: '9'

permissions:
  contents: read
  issues: write

jobs:
  detect:
    name: Scan for stale entries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run stale detector
        id: detect
        continue-on-error: true
        env:
          FRESHNESS_MONTHS: ${{ github.event.inputs.freshness_months || '9' }}
        run: |
          set +e
          node .github/scripts/find-stale-entries.mjs > freshness-report.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Open/update freshness issue
        if: steps.detect.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = 'Freshness audit — stale entries';
            const report = fs.readFileSync('freshness-report.md', 'utf8');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              report,
              '',
              '---',
              '',
              `_Generated by [\`.github/workflows/stale-entry-detector.yml\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/${context.sha}/.github/workflows/stale-entry-detector.yml) — [latest run](${runUrl})._`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'freshness,automation',
              per_page: 100,
            });
            const match = existing.find(i => i.title === title);

            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
              core.info(`Updated existing issue #${match.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['freshness', 'automation'],
              });
              core.info(`Opened issue #${created.number}`);
            }
