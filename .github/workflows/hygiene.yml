name: hygiene

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  mojibake:
    name: mojibake / encoding-corruption scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run hygiene scan
        run: python tools/repo-agent/src/repo_agent/hygiene.py .
