<svg xmlns="http://www.w3.org/2000/svg" width="200" height="40" viewBox="0 0 200 40" role="img" aria-label="Live Site">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2128"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-30%" width="120%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="0.5" y="0.5" width="199" height="39" rx="19.5" ry="19.5"
          fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
  </g>
  <!-- Globe icon -->
  <g transform="translate(16,12)" stroke="#e6edf3" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="8" cy="8" r="7"/>
    <ellipse cx="8" cy="8" rx="3" ry="7"/>
    <path d="M1 8h14"/>
  </g>
  <!-- Label -->
  <text x="44" y="25" fill="#e6edf3"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" letter-spacing="0.1">
    Live Site
  </text>
  <!-- Arrow -->
  <g transform="translate(174,14)" stroke="#e6edf3" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 6h11"/>
    <path d="M7 2l4 4-4 4"/>
  </g>
</svg>
